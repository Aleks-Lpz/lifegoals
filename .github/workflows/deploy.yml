name: Build and Deploy to Render

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal se llama así

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Descarga el código del repositorio en el servidor de GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Se loguea de forma segura en tu cuenta de Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Compila el Dockerfile y sube la imagen resultante a Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lifegoals:latest

    # 4. Le avisa a Render que hay una nueva imagen lista para desplegar en vivo
    - name: Deploy to Render
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
